services:
  postgres:
    image: postgres:16-alpine
    container_name: mini-game-hub-postgres
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: minigamehub
      POSTGRES_USER: minigamehub
      POSTGRES_PASSWORD: minigamehub
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U minigamehub -d minigamehub"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  postgres-data:
